trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

variables:
  NODE_VERSION: '20.x'
  ACR_NAME: $(acrName)
  IMAGE_TAG: $(Build.BuildId)

stages:
  # ─────────────────────────────────────────────────────────
  # STAGE 1: Instalar dependencias (con caché npm)
  # ─────────────────────────────────────────────────────────
  - stage: Install
    displayName: 'Instalar dependencias'
    jobs:
      - job: Install
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: 'Instalar Node.js'

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Pipeline.Workspace)/.npm
            displayName: 'Caché de npm'

          - script: npm ci --cache $(Pipeline.Workspace)/.npm
            displayName: 'npm ci'

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: node_modules
              artifact: node_modules
            displayName: 'Publicar node_modules'

  # ─────────────────────────────────────────────────────────
  # STAGE 2: Lint (TypeScript + ESLint)
  # ─────────────────────────────────────────────────────────
  - stage: Lint
    displayName: 'Lint y type-check'
    dependsOn: Install
    jobs:
      - job: Lint
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: node_modules
              targetPath: node_modules

          - script: npx tsc --noEmit -p tsconfig.base.json
            displayName: 'TypeScript type-check'

  # ─────────────────────────────────────────────────────────
  # STAGE 3: Tests (Jest + cobertura + resultados JUnit)
  # ─────────────────────────────────────────────────────────
  - stage: Test
    displayName: 'Tests unitarios e integración'
    dependsOn: Install
    jobs:
      - job: Test
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: node_modules
              targetPath: node_modules

          - script: |
              npm test --workspace=@crud-ms/shared -- --ci --reporters=default --reporters=jest-junit --coverage
              npm test --workspace=@crud-ms/auth-service -- --ci --reporters=default --reporters=jest-junit --coverage
              npm test --workspace=@crud-ms/users-service -- --ci --reporters=default --reporters=jest-junit --coverage
              npm test --workspace=@crud-ms/products-service -- --ci --reporters=default --reporters=jest-junit --coverage
            displayName: 'Ejecutar tests'
            env:
              JEST_JUNIT_OUTPUT_DIR: $(System.DefaultWorkingDirectory)/test-results
              JEST_JUNIT_OUTPUT_NAME: junit.xml

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/test-results/junit.xml'
              mergeTestResults: true
              testRunTitle: 'Jest Tests'
            condition: always()
            displayName: 'Publicar resultados de tests'

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: '**/coverage/cobertura-coverage.xml'
            condition: always()
            displayName: 'Publicar cobertura'

  # ─────────────────────────────────────────────────────────
  # STAGE 4: Build TypeScript
  # ─────────────────────────────────────────────────────────
  - stage: Build
    displayName: 'Compilar TypeScript'
    dependsOn: Test
    jobs:
      - job: Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: node_modules
              targetPath: node_modules

          - script: |
              npm run build --workspace=@crud-ms/shared
              npm run build --workspace=@crud-ms/auth-service
              npm run build --workspace=@crud-ms/users-service
              npm run build --workspace=@crud-ms/products-service
            displayName: 'tsc build todos los servicios'

  # ─────────────────────────────────────────────────────────
  # STAGE 5: Docker build (con cache-from para velocidad)
  # ─────────────────────────────────────────────────────────
  - stage: DockerBuild
    displayName: 'Docker build'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DockerBuild
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: 'Login a Azure Container Registry'
            inputs:
              command: login
              containerRegistry: $(acrServiceConnection)

          - script: |
              docker build \
                --cache-from $(ACR_NAME).azurecr.io/auth-service:latest \
                -t $(ACR_NAME).azurecr.io/auth-service:$(IMAGE_TAG) \
                -t $(ACR_NAME).azurecr.io/auth-service:latest \
                -f services/auth-service/Dockerfile .

              docker build \
                --cache-from $(ACR_NAME).azurecr.io/users-service:latest \
                -t $(ACR_NAME).azurecr.io/users-service:$(IMAGE_TAG) \
                -t $(ACR_NAME).azurecr.io/users-service:latest \
                -f services/users-service/Dockerfile .

              docker build \
                --cache-from $(ACR_NAME).azurecr.io/products-service:latest \
                -t $(ACR_NAME).azurecr.io/products-service:$(IMAGE_TAG) \
                -t $(ACR_NAME).azurecr.io/products-service:latest \
                -f services/products-service/Dockerfile .

              docker build \
                --cache-from $(ACR_NAME).azurecr.io/api-gateway:latest \
                -t $(ACR_NAME).azurecr.io/api-gateway:$(IMAGE_TAG) \
                -t $(ACR_NAME).azurecr.io/api-gateway:latest \
                ./api-gateway
            displayName: 'Build todas las imágenes'

  # ─────────────────────────────────────────────────────────
  # STAGE 6: Push a Azure Container Registry
  # ─────────────────────────────────────────────────────────
  - stage: Push
    displayName: 'Push a ACR'
    dependsOn: DockerBuild
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Push
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: 'Login a ACR'
            inputs:
              command: login
              containerRegistry: $(acrServiceConnection)

          - script: |
              docker push $(ACR_NAME).azurecr.io/auth-service:$(IMAGE_TAG)
              docker push $(ACR_NAME).azurecr.io/auth-service:latest
              docker push $(ACR_NAME).azurecr.io/users-service:$(IMAGE_TAG)
              docker push $(ACR_NAME).azurecr.io/users-service:latest
              docker push $(ACR_NAME).azurecr.io/products-service:$(IMAGE_TAG)
              docker push $(ACR_NAME).azurecr.io/products-service:latest
              docker push $(ACR_NAME).azurecr.io/api-gateway:$(IMAGE_TAG)
              docker push $(ACR_NAME).azurecr.io/api-gateway:latest
            displayName: 'Push imágenes'

  # ─────────────────────────────────────────────────────────
  # STAGE 7: Deploy (placeholder — Azure Container Apps o ACI)
  # ─────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy a Azure'
    dependsOn: Push
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Deploy
        environment: production
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploy a Azure Container Apps"
                    echo "IMAGE_TAG: $(IMAGE_TAG)"
                    # az containerapp update --name auth-service --resource-group $(resourceGroup) \
                    #   --image $(ACR_NAME).azurecr.io/auth-service:$(IMAGE_TAG)
                  displayName: 'Deploy (configurar az containerapp update)'
